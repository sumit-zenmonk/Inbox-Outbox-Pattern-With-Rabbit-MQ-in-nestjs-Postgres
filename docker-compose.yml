name: "rabbit-mq-compose-file"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5  
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

  pgadmin-1:
    image: dpage/pgadmin4:9.8
    ports:
      - 5051:80
    env_file: ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_1_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_1_DEFAULT_PASSWORD}
    volumes:
    - pgadmin_data_1:/var/lib/pgadmin

  database-1:
    image: postgres:16
    container_name: postgres_db_1
    restart: always
    env_file: ./microservice-1/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_1:/var/lib/postgresql/data

  pgadmin-2:
    image: dpage/pgadmin4:9.8
    ports:
      - 5052:80
    env_file: ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_2_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_2_DEFAULT_PASSWORD}
    volumes:
    - pgadmin_data_2:/var/lib/pgadmin

  database-2:
    image: postgres:16
    container_name: postgres_db_2
    restart: always
    env_file: ./microservice-2/.env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_2:/var/lib/postgresql/data

  microservice-1-backend:
    build:
      context: ./microservice-1
      dockerfile: dockerfile
    ports:
      - "3001:3001"
    depends_on:
      rabbitmq:
        condition: service_healthy 
    command: sh -c "npm run build && npm run start:dev"
    env_file: ./microservice-1/.env
    volumes:
      - ./microservice-1:/app
      - /app/node_modules 

  microservice-2-backend:
    build:
      context: ./microservice-2
      dockerfile: dockerfile
    ports:
      - "3002:3002"
    depends_on:
      rabbitmq:
        condition: service_healthy 
    command: sh -c "npm run build && npm run start:dev"
    env_file: ./microservice-2/.env
    volumes:
      - ./microservice-2:/app
      - /app/node_modules 

volumes:
  postgres_data_1: {}
  pgadmin_data_1: {}
  postgres_data_2: {}
  pgadmin_data_2: {}
